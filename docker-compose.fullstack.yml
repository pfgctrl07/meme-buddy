version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: meme-buddy-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - meme_buddy_mongo_data:/data/db

  backend-node:
    image: node:20
    container_name: meme-buddy-backend-node
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./backend-node:/app
    env_file:
      - ./backend-node/.env.example
    environment:
      MONGODB_URI: mongodb://mongo:27017/meme-buddy
      CLIENT_URL: http://localhost:3000
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    image: node:20
    container_name: meme-buddy-frontend-next
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
    env_file:
      - ./frontend/.env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend-node

volumes:
  meme_buddy_mongo_data:
